server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Using a variable for proxy_pass defers resolution
    # to request time, so nginx starts even if the backend is not yet reachable.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Allow resume uploads (form caps at 10MB; give headroom).
    client_max_body_size 15m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Healthcheck endpoint for Coolify.
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    # Proxy API calls to the Node server service.
    # The backend URL is injected at runtime via envsubst.
    location /api/ {
        set $backend ${NGINX_API_URL};
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Cache hashed static assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback so client-side routes (e.g. /responses) work on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
